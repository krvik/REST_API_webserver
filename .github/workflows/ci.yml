name: Simple CI Pipeline

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: Lint Code
    runs-on: [self-hosted]   # fixed casing
    steps:
      - uses: actions/checkout@v4

      # Optional: enable pip cache without installing Python
      - uses: actions/setup-python@v5
        with:
          cache: 'pip'

      - name: Show Python
        run: |
          python -V
          which python

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Run linting
        run: flake8 .

  tests:
    name: Run Tests
    runs-on: [self-hosted]
    needs: lint
    steps:
      - uses: actions/checkout@v4

      # Use the Python already installed on the runner
      - name: Show Python
        run: |
          python -V
          which python

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest -q

  build:
    name: Build API Image
    runs-on: [self-hosted]
    needs: tests
    steps:
      - uses: actions/checkout@v4

      - name: Build API Docker image using Makefile
        run: make build
