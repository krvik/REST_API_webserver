name: Simple CI Pipeline

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: Lint Code
    runs-on: [self-hosted]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install flake8

      - name: Run linting
        run: flake8 .

  tests:
    name: Run Tests
    runs-on: [self-hosted]
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest

      - name: Run tests
        run: pytest -q

  build:
    name: Build API Image
    runs-on: [self-hosted]
    needs: tests
    steps:
      - uses: actions/checkout@v4
      - name: Build API Docker image using Makefile
        run: make build
