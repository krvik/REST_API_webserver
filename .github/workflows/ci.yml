name: Simple CI Pipeline

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: self-hosted
    container:
      image: python:3.10-slim   # exact version you want
    steps:
      - uses: actions/checkout@v4
      - run: |
          python -V
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8
      - run: flake8 .

  tests:
    runs-on: self-hosted
    container:
      image: python:3.10-slim
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - run: |
          python -V
          python -m pip install -r requirements.txt
          pip install pytest
      - run: pytest -q

