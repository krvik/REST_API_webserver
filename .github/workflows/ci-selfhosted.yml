name: Self Hosted CI

on:
  push:
    paths: ['code/**']          # Run only when something under code/ changes
  pull_request:
    paths: ['code/**']

jobs:
  build:
    name: Build API
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v4

      # Install deps (adjust if you don't use Python)
      - name: Install deps
        working-directory: code
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # Do your app build here (simple example shown)
      - name: Build
        working-directory: code
        run: |
          if [ -f pyproject.toml ]; then
            pip install build
            python -m build
          else
            echo "No Python package build; skipping."
          fi

  test:
    name: Run tests
    runs-on: [self-hosted, linux, x64]
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Install test deps
        working-directory: code
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest
      - name: Pytest
        working-directory: code
        run: pytest -q

  lint:
    name: Lint code
    runs-on: [self-hosted, linux, x64]
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Install flake8
        working-directory: code
        run: |
          python -m pip install --upgrade pip
          pip install flake8
      - name: flake8
        working-directory: code
        run: flake8 .

  docker:
    name: Docker login, build & push
    runs-on: [self-hosted, linux, x64]
    needs: [test, lint]
    # Push only on main (not on PRs); change if you want different behavior
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      # Log in to Docker Hub (or your registry)
      - name: Docker login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # Build and push (adjust tags, context, and Dockerfile path if needed)
      - name: Build & push image
        run: |
          IMAGE="${{ github.repository }}:latest"      # e.g., owner/repo:latest
          docker build -t "$IMAGE" ./code
          docker push "$IMAGE"
