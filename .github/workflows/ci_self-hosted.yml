name: Self Hosted CI

on:
  push:
    paths: ['**']
  pull_request:
    paths: ['**']
  workflow_dispatch:

jobs:
  ping:
    name: Ping self-hosted runner
    runs-on: self-hosted
    steps:
      - run: |
          echo "OS=${RUNNER_OS} ARCH=${RUNNER_ARCH}"
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          ls -la

  build:
    name: Build API
    runs-on: self-hosted
    needs: ping
    steps:
      - uses: actions/checkout@v4

      - name: Set up venv + deps
        run: |
          python3 -V || true
          python3 -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Build
        run: |
          source .venv/bin/activate
          if [ -f pyproject.toml ]; then
            pip install build
            python -m build
          else
            echo "No Python package build; skipping."
          fi

  test:
    name: Run tests
    runs-on: self-hosted
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install test deps
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest

      - name: Pytest
        run: |
          source .venv/bin/activate
          pytest -q

  lint:
    name: Lint code
    runs-on: self-hosted
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: flake8
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          pip install flake8
          flake8 .

  docker:
    name: Docker login, build & push
    runs-on: self-hosted
    needs: [test, lint]
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    steps:

      - uses: actions/checkout@v4

      - name: Docker login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build & push image
        run: |
          IMAGE="${{ github.repository }}:latest"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
