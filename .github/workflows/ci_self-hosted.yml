name: Self Hosted CI

# Use bash consistently on self-hosted runners
defaults:
  run:
    shell: bash

on:
  push:
    paths: ['**']
  pull_request:
    paths: ['**']
  workflow_dispatch:

jobs:
  ping:
    name: Ping self-hosted runner
    runs-on: self-hosted
    steps:
      - run: |
          echo "OS=${RUNNER_OS} ARCH=${RUNNER_ARCH}"
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          echo "PATH=$PATH"
          which bash || true
          which python3 || true
          python3 -V || true

  build:
    name: Build API
    runs-on: self-hosted
    needs: ping
    steps:
      - uses: actions/checkout@v4

      # Preflight: verify python3 and venv are available on the runner
      - name: Preflight - python3/venv availability
        run: |
          set -e
          if ! command -v python3 >/dev/null 2>&1; then
            echo "python3 not found on this runner."
            echo "Install on the host: sudo apt-get install -y python3"
            exit 1
          fi

          PYVER="$(python3 -c 'import sys; print(".".join(map(str, sys.version_info[:2])))')"

          # Try creating a temporary venv; if it fails, venv is missing
          if ! python3 -m venv /tmp/_venv_test 2>/dev/null; then
            echo "python3-venv for Python ${PYVER} is missing on the runner."
            echo "Install on the host (once):"
            echo "   sudo apt-get update -y && sudo apt-get install -y python3-pip python${PYVER}-venv"
            # Fallback hint for distros that use generic package name:
            echo "   (If the above fails, try: sudo apt-get install -y python3-venv)"
            exit 1
          fi
          rm -rf /tmp/_venv_test

      - name: Set up venv + install deps
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Build
        run: |
          . .venv/bin/activate
          if [ -f pyproject.toml ]; then
            pip install build
            python -m build
          else
            echo "No pyproject.toml found; skipping build step."
          fi

  test:
    name: Run tests
    runs-on: self-hosted
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up venv + test deps
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest

      - name: Pytest
        run: |
          . .venv/bin/activate
          pytest -q

  lint:
    name: Lint code
    runs-on: self-hosted
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up venv + flake8
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          pip install flake8

      - name: Run flake8
        run: |
          . .venv/bin/activate
          flake8 . --exclude=.venv --max-line-length=120

  docker:
    name: Docker login, build & push
    runs-on: self-hosted
    needs: [test, lint]
    
    if: ${{ 
            (github.event_name == 'push' && github.ref == 'refs/heads/dev') ||
            github.event_name == 'workflow_dispatch'
          }}

    steps:
      - uses: actions/checkout@v4

      - name: Docker login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build & push image
        run: |
          IMAGE="${ secrets.DOCKER_USERNAME/rest_api_webserver}:latest"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
