name: Self Hosted CI

# 🔧 CHANGED: Added defaults to ensure a consistent shell on self-hosted runners
defaults:
  run:
    shell: bash

on:
  push:
    paths: ['**']
  pull_request:
    paths: ['**']
  workflow_dispatch:

jobs:
  ping:
    name: Ping self-hosted runner
    runs-on: self-hosted   # (kept loose to avoid idle due to label mismatch)
    steps:
      - run: |
          echo "OS=${RUNNER_OS} ARCH=${RUNNER_ARCH}"
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          echo "PATH=$PATH"
          which bash || true
          which python3 || true
          python3 -V || true

  build:
    name: Build API
    runs-on: self-hosted
    needs: ping
    steps:
      - uses: actions/checkout@v4

      # 🔧 CHANGED: Preflight check for python3 and venv (fail fast with clear message)
      - name: Preflight - python3/venv availability
        run: |
          set -e
          if ! command -v python3 >/dev/null 2>&1; then
            echo "python3 not found on runner. Install it on the host: sudo apt-get install -y python3"
            exit 1
          fi
          PYVER="$(python3 -c 'import sys; print(f\"{sys.version_info.major}.{sys.version_info.minor}\")')"
          if ! python3 -m venv /tmp/_venv_test 2>/dev/null; then
            echo "python3-venv for Python ${PYVER} is missing."
            echo "Install on the runner host (once): sudo apt-get update -y && sudo apt-get install -y python3.${PYVER##*.}-venv python3-pip"
            exit 1
          fi
          rm -rf /tmp/_venv_test

      # 🔧 CHANGED: Use venv + python -m pip; guard requirements.txt
      - name: Set up venv + deps
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Build
        run: |
          source .venv/bin/activate
          if [ -f pyproject.toml ]; then
            pip install build
            python -m build
          else
            echo "No Python package build; skipping."
          fi

  test:
    name: Run tests
    runs-on: self-hosted
    needs: build
    steps:
      - uses: actions/checkout@v4

      # 🔧 CHANGED: Use venv + python -m pip; include pytest install
      - name: Install test deps
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest

      - name: Pytest
        run: |
          source .venv/bin/activate
          pytest -q

  lint:
    name: Lint code
    runs-on: self-hosted
    needs: build
    steps:
      - uses: actions/checkout@v4

      # 🔧 CHANGED: Use venv + python -m pip; install flake8 then run
      - name: Set up venv + flake8
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          pip install flake8

      - name: Run flake8
        run: |
          source .venv/bin/activate
          flake8 .

  docker:
    name: Docker login, build & push
    runs-on: self-hosted
    needs: [test, lint]
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Docker login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build & push image
        run: |
          IMAGE="${{ github.repository }}:latest"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
