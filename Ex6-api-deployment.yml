# ============================
# NODE LABELS (for documentation only)
# Run these manually:
# kubectl label nodes minikube app-role=app
# kubectl label nodes minikube-m02 app-role=db
# kubectl label nodes minikube-m03 app-role=others
# ============================


# =====================================================
# API DEPLOYMENT (runs on app node)
# =====================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      nodeSelector:
        app-role: app
      containers:
      - name: api-container
        image: vikashkumardev1996/rest_api_webserver:latest
        ports:
        - containerPort: 5000


---
# =====================================================
# API SERVICE
# =====================================================
apiVersion: v1
kind: Service
metadata:
  name: api-service
spec:
  selector:
    app: api
  ports:
    - port: 80
      targetPort: 5000
  type: ClusterIP


---
# =====================================================
# POSTGRES DEPLOYMENT (runs on db node)
# =====================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        app: db
    spec:
      nodeSelector:
        app-role: db
      containers:
      - name: postgres
        image: postgres:15
        env:
        - name: POSTGRES_USER
          value: "postgres"
        - name: POSTGRES_PASSWORD
          value: "postgres"
        - name: POSTGRES_DB
          value: "students_db"
        ports:
        - containerPort: 5432


---
# =====================================================
# POSTGRES SERVICE
# =====================================================
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
spec:
  selector:
    app: db
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP


---
# =====================================================
# NGINX DEPLOYMENT (runs on others node)
# =====================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      nodeSelector:
        app-role: others
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80


---
# =====================================================
# NGINX SERVICE (external access)
# =====================================================
apiVersion: v1
kind: Service
metadata:
  name: nginx-service
spec:
  selector:
    app: nginx
  ports:
    - port: 80
      nodePort: 30080
  type: LoadBalancer
